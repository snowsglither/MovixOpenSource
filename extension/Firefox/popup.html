<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movix Extension</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: auto;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated grid background */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(99, 102, 241, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      padding-bottom: 4px;
    }

    .logo-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.3);
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .logo-wrapper::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 18px;
      background: conic-gradient(from 0deg, transparent, rgba(99, 102, 241, 0.4), transparent, transparent);
      animation: borderSpin 4s linear infinite;
      z-index: -1;
    }

    @keyframes borderSpin {
      to { transform: rotate(360deg); }
    }

    .logo-wrapper svg {
      width: 26px;
      height: 26px;
      color: #6366f1;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .header .version {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      font-weight: 500;
    }

    /* Status Badge */
    .status-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      width: fit-content;
      margin: 0 auto;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .status-badge.active {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }

    .status-badge.inactive {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-badge.active .status-dot {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }

    .status-badge.inactive .status-dot {
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* Big Toggle Button */
    .toggle-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 32px;
    }

    .toggle-btn {
      width: 100%;
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      letter-spacing: -0.2px;
    }

    .toggle-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .toggle-btn:hover::before {
      opacity: 1;
    }

    .toggle-btn:active {
      transform: scale(0.97);
    }

    .toggle-btn.enabled {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: #fff;
      box-shadow: 0 4px 24px rgba(220, 38, 38, 0.3), 0 0 0 1px rgba(220, 38, 38, 0.1);
    }

    .toggle-btn.enabled::before {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .toggle-btn.enabled:hover {
      box-shadow: 0 6px 32px rgba(220, 38, 38, 0.45), 0 0 0 1px rgba(220, 38, 38, 0.2);
    }

    .toggle-btn.disabled {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #fff;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.3), 0 0 0 1px rgba(99, 102, 241, 0.1);
    }

    .toggle-btn.disabled::before {
      background: linear-gradient(135deg, #6366f1, #818cf8);
    }

    .toggle-btn.disabled:hover {
      box-shadow: 0 6px 32px rgba(99, 102, 241, 0.45), 0 0 0 1px rgba(99, 102, 241, 0.2);
    }

    .toggle-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .toggle-btn svg, .toggle-btn span {
      position: relative;
      z-index: 2;
    }

    .toggle-hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 16px;
      transition: border-color 0.3s;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.1);
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-title svg {
      width: 14px;
      height: 14px;
      color: #6366f1;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .stat-item {
      text-align: center;
      padding: 10px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-value {
      font-size: 20px;
      font-weight: 800;
      color: #6366f1;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 2px;
      font-weight: 500;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding-top: 4px;
      padding-bottom: 4px;
    }

    .footer a {
      font-size: 11px;
      color: #6366f1;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .footer a:hover {
      color: #818cf8;
    }

    .footer a svg {
      width: 12px;
      height: 12px;
    }

    /* Separator */
    .separator {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.2), transparent);
      margin: 0;
    }

    /* Animations */
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
      opacity: 0;
    }

    .fade-in-delay-1 { animation-delay: 0.05s; }
    .fade-in-delay-2 { animation-delay: 0.1s; }
    .fade-in-delay-3 { animation-delay: 0.15s; }
    .fade-in-delay-4 { animation-delay: 0.2s; }
    .fade-in-delay-5 { animation-delay: 0.25s; }
    .fade-in-delay-6 { animation-delay: 0.3s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Disabled state overlay */
    .disabled-overlay {
      position: relative;
    }

    .disabled-overlay.is-disabled::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 10, 0.5);
      border-radius: 14px;
      pointer-events: none;
      z-index: 1;
    }

    .disabled-overlay.is-disabled {
      filter: grayscale(0.3);
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="container">
    <!-- Header -->
    <div class="header fade-in fade-in-delay-1">
      <div class="logo-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
           <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>Movix Extension</h1>
      <div class="version" id="version">v1.2.0</div>
    </div>

    <!-- Status -->
    <div class="fade-in fade-in-delay-2">
      <div class="status-badge active" id="statusBadge">
        <span class="status-dot"></span>
        <span id="statusText">Extension active</span>
      </div>
    </div>

    <!-- Toggle Button -->
    <div class="toggle-section fade-in fade-in-delay-3">
      <button class="toggle-btn enabled" id="toggleBtn">
        <svg id="toggleIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
        <span id="toggleText">Désactiver l'extension</span>
      </button>
      <div class="toggle-hint" id="toggleHint">L'extension intercepte les requêtes et extrait les flux vidéo</div>
    </div>

    <div class="separator"></div>

    <!-- Extraction State -->
    <div class="card fade-in fade-in-delay-4 disabled-overlay" id="extractionsCard">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        État des extractions
      </div>
      <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">
        <div class="stat-item">
          <div class="stat-value" id="m3u8EnabledCount">-/8</div>
          <div class="stat-label">Extracteurs m3u8</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="livetvEnabledCount">-/5</div>
          <div class="stat-label">Sources Live TV</div>
        </div>
      </div>
      <div style="margin-top: 12px; text-align: center;">
        <a href="https://movix.tax/settings#extractions" target="_blank" style="color:#6366f1;text-decoration:none;font-size:12px;font-weight:600;">
          Configurer →
        </a>
      </div>
    </div>

    <!-- Session Stats (compact) -->
    <div class="card fade-in fade-in-delay-5 disabled-overlay" id="statsCard">
      <div class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Session
      </div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="extractionCount">0</div>
          <div class="stat-label">Extractions</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="corsCount">0</div>
          <div class="stat-label">CORS</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="cacheCount">0</div>
          <div class="stat-label">En cache</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer fade-in fade-in-delay-6">
      <a href="https://movix.tax" target="_blank">
        Ouvrir Movix
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

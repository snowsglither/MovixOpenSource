<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Movix - Redirection</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            /* Reset & Base */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html {
                height: 100%;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Inter", sans-serif;
                background-color: #000000;
                color: #ffffff;
                width: 100%;
                min-height: 100%;
                /* Use 100dvh for better mobile support */
                min-height: 100dvh;
                display: grid;
                place-items: center;
                padding: 1.5rem;
                overflow-x: hidden;
                position: relative;
            }

            /* Ambient Background Effect */
            .ambient-glow {
                position: fixed;
                /* Changed to fixed to stay centered in viewport */
                width: 80vw;
                height: 80vw;
                max-width: 600px;
                max-height: 600px;
                background: radial-gradient(
                    circle,
                    rgba(220, 38, 38, 0.15) 0%,
                    rgba(0, 0, 0, 0) 70%
                );
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                pointer-events: none;
                z-index: 0;
            }

            /* Card Container - mimic bg-gray-800/50 border-gray-700/50 rounded-xl */
            .card {
                background-color: rgba(31, 41, 55, 0.5);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(55, 65, 81, 0.5);
                border-radius: 1rem;
                padding: 3rem 2rem;
                max-width: 480px;
                width: 100%;
                text-align: center;
                position: relative;
                z-index: 10;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }

            /* Icon */
            .icon-wrapper {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 80px;
                height: 80px;
                border-radius: 50%;
                background-color: rgba(220, 38, 38, 0.1);
                color: #f87171;
                /* text-red-400 */
                margin-bottom: 1.5rem;
                border: 1px solid rgba(220, 38, 38, 0.2);
            }

            .icon-wrapper svg {
                width: 40px;
                height: 40px;
            }

            /* Typography */
            h1 {
                font-size: 1.875rem;
                /* 3xl */
                font-weight: 700;
                margin-bottom: 1rem;
                line-height: 1.2;
            }

            .text-highlight {
                color: rgba(248, 113, 113, 0.9);
                /* text-red-400/90 */
            }

            p {
                color: #9ca3af;
                /* text-gray-400 */
                font-size: 1rem;
                line-height: 1.6;
                margin-bottom: 2rem;
            }

            /* Button - mimic bg-red-600 hover:bg-red-700 */
            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                background-color: #dc2626;
                color: white;
                font-weight: 600;
                padding: 0.875rem 1.5rem;
                border-radius: 0.75rem;
                /* rounded-xl */
                text-decoration: none;
                transition: all 0.2s ease;
                width: 100%;
                border: none;
                cursor: pointer;
                font-size: 1rem;
                box-shadow:
                    0 4px 6px -1px rgba(220, 38, 38, 0.2),
                    0 2px 4px -1px rgba(220, 38, 38, 0.1);
            }

            .btn:hover {
                background-color: #b91c1c;
                transform: translateY(-1px);
                box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3);
            }

            .btn svg {
                margin-left: 0.5rem;
                width: 20px;
                height: 20px;
            }

            .btn-telegram {
                background-color: #229ed9;
                margin-top: 1rem;
                box-shadow:
                    0 4px 6px -1px rgba(34, 158, 217, 0.2),
                    0 2px 4px -1px rgba(34, 158, 217, 0.1);
            }

            .btn-telegram:hover {
                background-color: #1b7db5;
                box-shadow: 0 10px 15px -3px rgba(34, 158, 217, 0.3);
            }

            /* Secondary Info */
            .domain-badge {
                display: inline-block;
                background-color: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                padding: 0.25rem 0.75rem;
                border-radius: 9999px;
                font-size: 0.875rem;
                color: #d1d5db;
                /* gray-300 */
                margin-top: 1.5rem;
                font-family: monospace;
            }

            /* Animations */
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }

                50% {
                    opacity: 0.5;
                }
            }

            /* Mobile Responsiveness */
            @media (max-width: 640px) {
                .card {
                    padding: 2rem 1.5rem;
                    width: 95%;
                    /* Adjust width for mobile */
                }

                h1 {
                    font-size: 1.5rem;
                }

                p {
                    font-size: 0.95rem;
                    margin-bottom: 1.5rem;
                }

                .icon-wrapper {
                    width: 60px;
                    height: 60px;
                    margin-bottom: 1rem;
                }

                .icon-wrapper svg {
                    width: 30px;
                    height: 30px;
                }

                .btn {
                    font-size: 0.95rem;
                    padding: 0.75rem 1rem;
                }
            }
        </style>
    </head>

    <body>
        <div class="ambient-glow"></div>

        <div class="card">
            <div class="icon-wrapper">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                    />
                </svg>
            </div>

            <h1>
                Attention, mauvais <span class="text-highlight">domaine</span>
            </h1>

            <p>
                Site non officiel ou incorrect. Pour garantir votre sécurité et
                accéder à vos films et séries, veuillez utiliser l'adresse
                officielle.
            </p>

            <a
                href="https://movix.cash"
                target="_blank"
                rel="noopener noreferrer"
                class="btn"
            >
                Accéder à Movix.cash
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M17 8l4 4m0 0l-4 4m4-4H3"
                    />
                </svg>
            </a>

            <a
                href="https://t.me/movix_site"
                target="_blank"
                class="btn btn-telegram"
            >
                Rejoindre le Telegram
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"
                    />
                </svg>
            </a>

            <div class="domain-badge">movix.cash</div>
        </div>
    </body>
</html>
